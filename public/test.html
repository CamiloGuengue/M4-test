<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Megastore</title>
  <style>
    body { font-family: 'Segoe UI', monospace; max-width: 900px; margin: 30px auto; padding: 20px; background: #1a1a1a; color: #eee; }
    .card { background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
    button { padding: 10px 15px; margin: 5px; background: #00c853; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
    button:hover { background: #00a443; }
    button.alt { background: #007bff; }
    pre { background: #000; padding: 15px; border-radius: 5px; max-height: 400px; overflow: auto; color: #00ff41; border: 1px solid #00ff41; }
    input, textarea { padding: 10px; margin: 5px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; }
    .status-tag { font-size: 0.8em; padding: 4px 8px; border-radius: 4px; }
    .success { background: #1b5e20; }
    .error { background: #b71c1c; }
    h3 { margin-top: 0; color: #00c853; border-bottom: 1px solid #333; padding-bottom: 10px; }
  </style>
</head>
<body>
  <h1>⚡ MegaStore Tester</h1>
  
  <div class="card">
    <h3>🔐 Autenticación (Supabase Auth)</h3>
    <input id="email" placeholder="Email" value="admin@test.com">
    <input id="pass" type="password" placeholder="Password" value="123456">
    <br>
    <button onclick="login()">Login</button>
    <button onclick="register('ADMIN')" class="alt">Reg Admin</button>
    <button onclick="register('AGENT')" class="alt">Reg Agent</button>
    <br><br>
    <input id="token" style="width: 90%;" placeholder="Token JWT aparecerá aquí...">
  </div>

  <div class="card">
    <h3>🍃 Híbrido (MongoDB Atlas + SQL)</h3>
    <p>Crea datos embebidos en Mongo vinculados al ID de Supabase:</p>
    <input id="targetId" placeholder="ID del Usuario (UUID)">
    <input id="bio" placeholder="Biografía corta">
    <button onclick="setupMongoProfile()">1. Guardar en Mongo</button>
    <button onclick="getFullProfile()" class="alt">2. Ver Perfil Híbrido</button>
  </div>

  <div class="card">
    <h3>📊 Consultas SQL (Supabase)</h3>
    <button onclick="getCustomers()">GET Customers</button>
    <button onclick="getOrders()">GET Orders</button>
    <button onclick="dbStatus()" class="alt">Check DB Status</button>
    <button onclick="mongoStatus()" style="background:#4db33d">Check Mongo Status</button>
  </div>
  
  <h3>📄 Consola de Salida:</h3>
  <pre id="result">Esperando acciones...</pre>

  <script>
    async function api(url, options = {}) {
      const resDisplay = document.getElementById('result');
      try {
        const headers = { 'Content-Type': 'application/json' };
        const token = document.getElementById('token').value;
        if (token) headers['Authorization'] = token.startsWith('Bearer') ? token : `Bearer ${token}`;

        const res = await fetch(url, { headers, ...options });
        const data = await res.json();
        
        resDisplay.innerHTML = `<span class="status-tag ${res.ok ? 'success' : 'error'}">HTTP ${res.status}</span>\n` + 
                               JSON.stringify(data, null, 2);
        return data;
      } catch (err) {
        resDisplay.textContent = '❌ Error de red: ' + err.message;
      }
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('pass').value;
      const data = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      if (data.token) document.getElementById('token').value = data.token;
    }

    async function register(role) {
      const email = `user${Date.now()}@test.com`;
      await api('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({ email, password: '123', role })
      });
    }

    // Lógica para MongoDB Atlas (Datos Embebidos)
    async function setupMongoProfile() {
      const supabaseId = document.getElementById('targetId').value;
      const biografia = document.getElementById('bio').value;
      
      // Ejemplo de datos embebidos (un array de metas)
      const metas = [
        { titulo: "Primer login", completada: true },
        { titulo: "Completar perfil", completada: false }
      ];

      await api('/api/setup-profile', {
        method: 'POST',
        body: JSON.stringify({ supabaseId, biografia, metas })
      });
    }

    async function getFullProfile() {
      const id = document.getElementById('targetId').value;
      if(!id) return alert("Pon un ID primero");
      // Este endpoint es el que creamos que une Supabase + Mongo
      await api(`/api/sql/customer-full-profile/${id}`);
    }

    async function getCustomers() { await api('/api/sql/customers'); }
    async function getOrders() { await api('/api/sql/orders'); }
    async function dbStatus() { await api('/db-test'); }
    async function mongoStatus() { await api('/mongo-test'); }
  </script>
</body>
</html>
